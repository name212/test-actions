name: Test Yq Action envs
on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  Test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: "Set yaml to output"
        id: set_input
        env: 
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }} 
        run: |
          YAML_STR=$(cat <<EOF
          a: b
          arr:
          - 1
          - 2
          commit: "$COMMIT_SHA"
          EOF
          )
          echo "YAML_INPUT<<YAML_STR_EOF" >> $GITHUB_OUTPUT
          echo "$YAML_STR" >> $GITHUB_OUTPUT
          echo "YAML_STR_EOF" >> $GITHUB_OUTPUT
          echo "$YAML_STR" > ./.tmp-aaaaaa.yaml
      - name: "Show input yaml"
        id: show_input
        run: |
          echo "Input YAML:"
          echo '${{ steps.set_input.outputs.YAML_INPUT }}'
      - name: 
        id: test_envs
        uses: mikefarah/yq@master
        env:
          TO_ADD: "{\"c\": true}" 
          REPLACE: "3"
        with:
          cmd: |
            cat ./.tmp-aaaaaa.yaml | '. += env(TO_ADD) , .arr[1] = env(REPLACE)'
          # envs: |
          #   {
          #     "INPUT": ${{ toJSON(steps.set_input.outputs.YAML_INPUT) }}, 
          #     "TO_ADD": "{\"c\": true}", 
          #     "REPLACE": "3"
          #   }
      - name: "Show result"
        id: show_result
        run: |
          echo "Result YAML:"
          echo '${{ steps.test_envs.outputs.result }}'
          rm -f ./.tmp-aaaaaa.yaml
